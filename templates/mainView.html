{% with messages = get_flashed_messages() %}
    {% if messages %}
        <script>
            alert("{{messages[-1]}}")
        </script>
    {% endif %}
{% endwith %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel = "stylesheet">
    <link rel = "shortcut icon" href = "favicon.ico" type="image/x-icon">
    <link rel = "stylesheet" type = "text/css" href = "{{url_for('static', filename='css/style.css')}}">
    <link rel = "stylesheet" type = "text/js" href = "{{url_for('static', filename='js/main.js')}}">
    <link href="style.css" media = "screen" rel = "stylesheet">
    <title>Term</title>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.9.5/brython.min.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/brython/3.9.5/brython_stdlib.min.js"></script>
</head>
<body onload="brython()">
    <div class = "wrap">
        <h1><span class = "material-icons">article</span></h1>
        <h2 style = " font-size: 4rem;">Term</h2>
        <span class="text"></span><span class = "blink">|</span>
        <script src = "static/js/main.js"></script>
        <form action="/fileupload" enctype="multipart/form-data" method="POST">
          <input type="file" accept = ".docx, .doc" name="file" multiple>
          <button id='button' type="submit" class="btn btn-primary">Upload</button>
        </form>
        <script type="text/python">
            from flask import Flask, render_template
            from browser import document
            from mainProgram import *

            def alert(event):
                result = main()
                if result == "end":
                    return render_template('upload.html')

            document['button'].bind("click", alert)
        </script>
    </div>
</body>
</html>
